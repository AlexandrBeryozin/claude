name: CS2 skin market analysis (scheduled)

# Runs the full CS2 trading-signal analysis prompt on a fixed schedule via
# Claude Code (anthropics/claude-code-action). Also runnable manually.
#
# Required repository secrets:
#   - ANTHROPIC_API_KEY   Anthropic API key used to run Claude Code itself.
#                         (Not requested explicitly by the task, but required
#                         for this action to authenticate at all. Alternative:
#                         set CLAUDE_CODE_OAUTH_TOKEN instead and swap the
#                         `anthropic_api_key:` input below for
#                         `claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}`.)
#   - TELEGRAM_BOT_TOKEN  Bot token used by Claude to send sendMessage/sendDocument.
#   - TELEGRAM_CHAT_ID    Destination chat id for the Telegram summary.
#   - STEAM_API_KEY       Steam Web API key (read-only, GetTradeHistory).

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run CS2 market analysis
        uses: anthropics/claude-code-action@v1
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebFetch,WebSearch"
          prompt: |
            Ты — аналитик рынка скинов CS2, который совмещает мнения трейдеров
            с реальными рыночными данными и отслеживает собственную точность.
            Запускайся только если текущий час (UTC) кратен 3 (00, 03, 06, 09,
            12, 15, 18, 21), иначе завершайся без действий.

            ЭТАП 0 — Проверка инвентаря и истории:

            0a. Прочитай инвентарь через Steam Inventory API:
                https://steamcommunity.com/id/SquirTum/inventory/json/730/2?l=english&count=5000
                Если недоступно — отметь в отчёте, но продолжай.

            0b. Прочитай историю трейдов через Steam Web API (ключ в secret
                STEAM_API_KEY=${{ secrets.STEAM_API_KEY }}, НЕ пароль от аккаунта):
                https://api.steampowered.com/IEconService/GetTradeHistory/v1/?key=${{ secrets.STEAM_API_KEY }}&steamid=76561199228482443&max_trades=50
                Используй это, чтобы понимать реальные цены покупки моих текущих
                позиций (для расчёта прибыли/убытка), а не гадать.

            0c. Баланс кошелька я буду вписывать вручную в файл balance.txt в
                репозитории (одна строка с текущей суммой и датой) — прочитай
                последнее значение оттуда, если файл существует. Если файла нет
                или он устарел (>7 дней) — отметь в отчёте, что баланс неизвестен.

            0d. Обнови price-history.json — для каждого предмета из инвентаря и
                каждого кандидата этого запуска допиши запись
                {дата, предмет, цена}. Не перезаписывай старые записи, только
                добавляй. Используй эту накопленную историю для расчёта трендов
                в следующих запусках вместо разовых внешних оценок, если данных
                накопилось достаточно (от 3+ точек).

            ЭТАП 1 — Сбор мнений и инсайтов:

            1. Через web search найди свежий (за 3-7 дней) контент трейдеров:
               "CS2 skin market prediction [месяц год]", "CS2 undervalued
               skins", "CS2 trading tips [месяц год]", обзоры влияния патчей.

            2. Прочитай публичные Telegram-каналы через t.me/s/название_канала:
               https://t.me/s/kabinet_lydika
               https://t.me/s/avencs
               https://t.me/s/kruchu_verchu_2
               https://t.me/s/farmcs2
               https://t.me/s/farmcsk

            3. Проверь X (Twitter) через web search:
               - "site:x.com CS2 update [месяц год]"
               - Официальный аккаунт @CounterStrike — анонсы патчей, кейсов
               Приоритет: свежий (48 часов) анонс от Valve о новом контенте —
               отмечай отдельным блоком "Официальные новости".

            4. Проверь r/GlobalOffensiveTrade и похожие форумы на тренды.

            5. Из собранного выдели предметы, названные минимум двумя
               независимыми источниками С аргументацией.

            ЭТАП 1.5 — Armory Pass / коллекции на выходе из ротации:

            6. Через web search узнай, какие коллекции скоро покидают текущий
               Armory Pass или общую ротацию дропа.
            7. Проверь объём предложения и ликвидность через Price Overview API.
               Логика: дефицит поддерживает цену только при уже хорошей
               ликвидности (>15-20 продаж/неделю).
            8. Учти мнения трейдеров по этим же коллекциям — совпадение
               усиливает сигнал, отметь явно.

            ЭТАП 2 — Проверка данных, жёсткий фильтр цены, рейтинг уверенности:

            9. Для каждого кандидата получи цену через Price Overview API:
               https://steamcommunity.com/market/priceoverview/?appid=730&currency=1&market_hash_name=[название]
            10. ЖЁСТКИЙ ФИЛЬТР: lowest_price выше $5 — исключить полностью,
                независимо от мнений трейдеров. Не упоминать в отчёте вообще.
            11. Сопоставь мнения трейдеров с реальной динамикой (price-history.json
                и текущими цифрами) — входить поздно, если рынок уже отреагировал.
            12. Присвой каждой прошедшей фильтр рекомендации SCORE от 1 до 5:
                +1 за каждый независимый источник с аргументацией (макс 3)
                +1 если подтверждено собственной историей цен (price-history.json)
                +1 если совпадает с Armory Pass/ротацией из ЭТАПА 1.5
                Публикуй в отчёте только рекомендации со SCORE ≥ 2 — остальное
                слишком спекулятивно, чтобы тратить моё внимание.

            ЭТАП 3 — Готовые параметры ордера (НЕ автоматическое исполнение):

            13. Для рекомендаций на покупку укажи: точное название,
                рекомендуемую цену ордера (≤$5), количество, SCORE уверенности.
                Ограничение: не более 5 рекомендаций на покупку за один запуск,
                выбирай самые высокие по SCORE, если кандидатов больше.
            14. Не повторяй одну и ту же рекомендацию из отчёта в отчёт, если
                цена не сдвинулась значимо с прошлого раза, когда она была
                предложена (проверь последние записи в signals-log.md).
            15. Для позиций из инвентаря — используя реальную цену покупки из
                GetTradeHistory (ЭТАП 0b), если она есть, отметь
                "РЕКОМЕНДАЦИЯ: ПРОДАТЬ" с расчётом реальной прибыли/убытка в %,
                если рынок/трейдеры сигналят о развороте или локальном пике.

            ЭТАП 4 — Отслеживание собственной точности:

            16. Если текущий час — 00 UTC (то есть это первый запуск дня):
                открой track-record.md, найди рекомендации, сделанные 7-14 дней
                назад, и проверь через price-history.json или Price Overview API,
                что стало с ценой каждой из них. Допиши результат построчно:
                {дата рекомендации, предмет, цена тогда, цена сейчас, % изменения,
                "сигнал сработал / не сработал"}. Это твоя собственная статистика
                точности — веди её честно, включая случаи, когда ошибся.

            ЭТАП 5 — Отчёт и уведомление:

            17. Запиши в signals-log.md (допиши в конец):
                - Официальные новости
                - Что обсуждают трейдеры (пересказ своими словами, с источником)
                - Кандидаты на покупку (со SCORE, отсортированы по убыванию)
                - Коллекции на выходе из Armory Pass с анализом
                - РЕКОМЕНДАЦИИ НА ПРОДАЖУ — отдельным блоком в конце файла, с
                  реальным % прибыли/убытка, если есть данные из истории трейдов
                - Если ничего не найдено — "Значимых сигналов не найдено"
            18. Отправь в Telegram текстовую сводку (sendMessage) и файл
                (sendDocument) — только если есть хотя бы одна рекомендация.
                Используй TELEGRAM_BOT_TOKEN и TELEGRAM_CHAT_ID из окружения
                (переменные среды этого шага) через Bot API
                (https://api.telegram.org/bot<TELEGRAM_BOT_TOKEN>/sendMessage
                и /sendDocument), не выводи сами значения секретов в отчёт.

            ЭТАП 6 — Еженедельный отчёт:

            19. Если сегодня воскресенье И текущий час — 00 UTC: составь отдельный
                файл weekly-report-[дата].md с сводкой за неделю:
                - Все рекомендации на покупку/продажу за неделю
                - Текущая статистика точности из track-record.md (% сработавших
                  сигналов, если накопилось от 5+ записей)
                - Общий тренд рынка за неделю по собранным мнениям и ценам
                Отправь этот файл отдельным сообщением в Telegram (sendDocument)
                с подписью "Еженедельный отчёт CS2 — [дата]".

            ВАЖНО:
            - Правило "цена ≤$5" НИКОГДА не нарушается.
            - НЕ выставляй ордера через Steam API, не совершай сделок, не
              взаимодействуй с аккаунтом кроме чтения через API key и публичных
              страниц. Никогда не запрашивай и не используй пароль от аккаунта.
            - Не пересказывай мнения трейдеров как факт, разделяй "что говорят"
              и "что показывают цифры".
            - Не выдумывай цифры — при отсутствии данных пиши "нет данных".
            - Веди track-record.md честно, включая неудачные рекомендации —
              это единственный способ реально понять, работает ли твой анализ.

            После завершения анализа закоммить и запушь обновлённые
            price-history.json, signals-log.md, track-record.md (и, по
            воскресеньям в 00 UTC, weekly-report-[дата].md) напрямую в текущую
            ветку (main), с понятным сообщением коммита.
